name: wanxiang-mini-ios
options:
  bundleIdPrefix: com.wanxiang
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  SWIFT_VERSION: "5.9"
  IPHONEOS_DEPLOYMENT_TARGET: "17.0"

targets:
  wanxiang-mini-ios:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
        includes:
          - "**/*.swift"
          - "**/*.xcassets"
    info:
      path: Sources/Info.plist
      properties:
        CFBundleDisplayName: 迷你万象
        CFBundleIdentifier: com.wanxiang.mini
        CFBundleVersion: "1"
        CFBundleShortVersionString: "1.0"
        UILaunchScreen:
          UIColorName: ""
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: false
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.wanxiang.mini
      MARKETING_VERSION: "1.0"
      CURRENT_PROJECT_VERSION: "1"
      INFOPLIST_FILE: Sources/Info.plist
      ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
